<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR kód – hlubocek.github.io</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #f0f4f1; padding: 2rem; text-align: center;
        }
        h1 { font-size: 1.25rem; color: #1a2e1f; margin-bottom: 1rem; }
        #qr-wrap { background: #fff; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.1); margin-bottom: 1rem; }
        #qr-wrap canvas, #qr-wrap img { display: block !important; }
        .url { font-size: 0.9rem; color: #5a7062; margin-bottom: 1.25rem; word-break: break-all; }
        .btn {
            display: inline-block; padding: 0.65rem 1.25rem; background: #1a6b3c; color: #fff;
            border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
        }
        .btn:hover { background: #2a8f52; }
    </style>
</head>
<body>
    <h1>QR kód pro aplikaci</h1>
    <div id="qr-wrap"></div>
    <p class="url">https://hlubocek.github.io</p>
    <button class="btn" id="btn-download">Stáhnout QR jako PNG</button>

    <script>
        const url = 'https://hlubocek.github.io';
        const wrap = document.getElementById('qr-wrap');
        wrap.innerHTML = '';
        new QRCode(wrap, {
            text: url,
            width: 280,
            height: 280,
            colorDark: '#1a2e1f',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.M
        });

        document.getElementById('btn-download').onclick = function () {
            const canvas = wrap.querySelector('canvas');
            if (!canvas) return;
            const a = document.createElement('a');
            a.download = 'qr-hlubocek.github.io.png';
            a.href = canvas.toDataURL('image/png');
            a.click();
        };
    </script>
</body>
</html>
